<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEX — 3D mahsulot vizualizatori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <p>3D muhit yuklanmoqda...</p>
  </div>

  <header class="header">
    <a href="#" class="logo">NEX</a>
    <nav class="nav-links">
      <a href="https://github.com/RaximjonRaximov/nex-3d-product-visualizer" target="_blank">GitHub</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Menyu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-scroll">
        <section class="panel">
          <h3 class="panel-title">Mahsulot</h3>
          <div class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept=".glb,.gltf" hidden>
            <div class="dropzone-content">
              <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              <p>GLB yoki GLTF faylni bu yerga tashlang</p>
              <span>yoki <strong>tanlash uchun bosing</strong></span>
            </div>
          </div>
          <button class="btn btn-secondary btn-block" id="loadSample">Namunani ko‘rish</button>
        </section>

        <section class="panel">
          <h3 class="panel-title">Asosiy sozlamalar</h3>
          <div class="global-controls">
            <label class="toggle">
              <span>Avto aylantirish</span>
              <input type="checkbox" id="autoRotate" checked>
              <span class="toggle-switch"></span>
            </label>
            <label class="toggle">
              <span>Qoplamalar ko‘rsatilsin</span>
              <input type="checkbox" id="showGrid" checked>
              <span class="toggle-switch"></span>
            </label>
          </div>
        </section>

        <section class="panel" id="materialPanel">
          <h3 class="panel-title">Material sozlamalari</h3>
          <div class="material-list" id="materialList">
            <p class="empty-text">Mahsulot yuklang, materialni sozlash mumkin bo‘ladi.</p>
          </div>
        </section>

        <section class="panel">
          <h3 class="panel-title">Harakatlar</h3>
          <div class="action-grid">
            <button class="btn btn-icon" id="resetCamera" title="Kamerani tiklash">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/></svg>
              <span>Tiklash</span>
            </button>
            <button class="btn btn-icon" id="takeScreenshot" title="Skrinshot">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span>Skrinshot</span>
            </button>
            <button class="btn btn-icon" id="toggleFullscreen" title="To‘liq ekran">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
              <span>Ekran</span>
            </button>
            <button class="btn btn-icon" id="resetModel" title="Barcha sozlamalarni tiklash">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/></svg>
              <span>Yangilash</span>
            </button>
          </div>
        </section>
      </div>
    </aside>

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="webgl"></canvas>
      <div class="canvas-hint" id="canvasHint">
        <span>Mouse bilan aylantiring, scroll bilan yaqinlashtiring</span>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
